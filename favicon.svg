<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">N1GHT CHXN9 collection</title>
  <desc id="desc">A layered photo frame with a small archive star</desc>
  <defs>
    <linearGradient id="back" x1="10" y1="10" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e5edf6" />
      <stop offset="1" stop-color="#cbd8e7" />
    </linearGradient>
    <linearGradient id="ink" x1="13" y1="11" x2="51" y2="51" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7189a8" />
      <stop offset="1" stop-color="#506884" />
    </linearGradient>
  </defs>

  <!-- A quiet paper ground keeps the mark legible on light and dark browser chrome. -->
  <rect width="64" height="64" rx="15" fill="#f8fafc" />

  <!-- Offset card: the collection is a stack, not a monogram. -->
  <path d="M20 12h25c5 0 9 4 9 9v27c0 2.2-1.8 4-4 4H22c-5 0-9-4-9-9V21c0-5 2-9 7-9Z" fill="url(#back)" />

  <!-- Foreground frame. -->
  <rect x="9.5" y="9.5" width="40" height="40" rx="10" fill="#fff" stroke="url(#ink)" stroke-width="3" />
  <path d="m16.5 40 8.2-10 6.4 7 5.2-6 7.2 9" fill="none" stroke="#5d769d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="39.5" cy="21" r="3.25" fill="#8fa4bf" />

  <!-- A small archive spark, sized to survive a 16px favicon rendering. -->
  <path d="m49 16 1.45 3.55L54 21l-3.55 1.45L49 26l-1.45-3.55L44 21l3.55-1.45L49 16Z" fill="#5d769d" />
</svg>
